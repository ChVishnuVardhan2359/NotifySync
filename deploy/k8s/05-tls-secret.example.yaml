# OPTION A — create the TLS secrets from your own cert/key files (recommended):
#
#   kubectl create secret tls notifysync-web-tls \
#     --cert=fullchain-web.pem --key=privkey-web.pem -n notifysync
#
#   kubectl create secret tls notifysync-api-tls \
#     --cert=fullchain-api.pem --key=privkey-api.pem -n notifysync
#
# If you have a single wildcard cert (*.platform.kb.snovasys.com), use the same
# cert/key for both secret names above.
#
# OPTION B — declare them as YAML (base64-encoded cert/key). Fill in and apply:
---
apiVersion: v1
kind: Secret
metadata:
  name: notifysync-web-tls
  namespace: notifysync
type: kubernetes.io/tls
data:
  tls.crt: <base64-of-your-fullchain.pem>
  tls.key: <base64-of-your-privkey.pem>
---
apiVersion: v1
kind: Secret
metadata:
  name: notifysync-api-tls
  namespace: notifysync
type: kubernetes.io/tls
data:
  tls.crt: <base64-of-your-fullchain.pem>
  tls.key: <base64-of-your-privkey.pem>
